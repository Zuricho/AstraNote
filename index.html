<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstraNote</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino,
          Georgia, serif;
        color: #172033;
        background: #efe8dd;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(184, 106, 74, 0.14), transparent 26rem),
          radial-gradient(circle at top right, rgba(35, 49, 77, 0.06), transparent 24rem),
          linear-gradient(180deg, #f7f1e7 0%, #ede4d7 100%);
      }

      .app-shell {
        min-height: 100%;
        padding: 28px;
      }

      .editor-frame {
        min-height: calc(100vh - 56px);
        max-width: 980px;
        margin: 0 auto;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.96), rgba(255, 252, 246, 0.92));
        border: 1px solid rgba(202, 189, 171, 0.72);
        border-radius: 26px;
        box-shadow:
          0 26px 90px rgba(23, 32, 51, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .editor-scroll {
        min-height: calc(100vh - 56px);
        overflow-y: auto;
        padding: 72px 88px 88px;
      }

      .editor-scroll::-webkit-scrollbar {
        width: 12px;
      }

      .editor-scroll::-webkit-scrollbar-thumb {
        border-radius: 9999px;
        border: 3px solid transparent;
        background: rgba(91, 100, 117, 0.32);
        background-clip: padding-box;
      }

      .editor-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .editor-content {
        min-height: calc(100vh - 200px);
        max-width: 43rem;
        margin: 0 auto;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        outline: none;
        white-space: pre-wrap;
        line-height: 1.8;
        color: #172033;
        font-size: 1.08rem;
        caret-color: #b86a4a;
      }

      .editor-content > :first-child {
        margin-top: 0;
      }

      .editor-content h1,
      .editor-content h2,
      .editor-content h3 {
        line-height: 1.25;
        letter-spacing: -0.02em;
      }

      .editor-content h1 {
        margin: 0 0 0.7rem;
        font-size: 2.35rem;
      }

      .editor-content h2 {
        margin: 1.7rem 0 0.45rem;
        font-size: 1.65rem;
      }

      .editor-content h3 {
        margin: 1.4rem 0 0.35rem;
        font-size: 1.24rem;
      }

      .editor-content p,
      .editor-content ul,
      .editor-content ol,
      .editor-content blockquote,
      .editor-content pre,
      .editor-content hr {
        margin: 0.8rem 0;
      }

      .editor-content ul,
      .editor-content ol {
        padding-left: 1.65rem;
      }

      .editor-content li + li {
        margin-top: 0.24rem;
      }

      .editor-content blockquote {
        margin-left: 0;
        padding-left: 1.1rem;
        border-left: 3px solid #b86a4a;
        color: #495468;
        font-style: italic;
      }

      .editor-content code {
        border-radius: 0.45rem;
        background: #f1ece4;
        padding: 0.1rem 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        color: #8c4f35;
      }

      .editor-content pre {
        overflow-x: auto;
        border-radius: 1rem;
        background: #172033;
        padding: 1.05rem 1.1rem;
        color: #ebeff6;
        box-shadow: 0 14px 30px rgba(23, 32, 51, 0.14);
      }

      .editor-content pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .editor-content hr {
        border: 0;
        border-top: 1px solid #ddd2c4;
      }

      .editor-content ::selection {
        background: rgba(184, 106, 74, 0.18);
      }

      @media (max-width: 720px) {
        .app-shell {
          padding: 12px;
        }

        .editor-frame {
          min-height: calc(100vh - 24px);
          border-radius: 20px;
        }

        .editor-scroll {
          min-height: calc(100vh - 24px);
          padding: 34px 22px 42px;
        }

        .editor-content {
          min-height: calc(100vh - 110px);
          font-size: 1rem;
        }

        .editor-content h1 {
          font-size: 1.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./assets/app.js"></script>
  </body>
</html>
