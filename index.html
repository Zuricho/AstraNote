    <!-- We keep Tailwind CDN for simplicity in this demo, though npm install is better for prod -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gray: {
                850: '#1f2937',
                900: '#111827',
                950: '#0b0f19',
              },
              primary: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              }
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.gray.800'),
                  a: {
                    color: theme('colors.primary.600'),
                    '&:hover': {
                      color: theme('colors.primary.700'),
                    },
                  },
                },
              },
              dark: {
                css: {
                  color: theme('colors.gray.300'),
                  a: {
                    color: theme('colors.primary.400'),
                    '&:hover': {
                      color: theme('colors.primary.300'),
                    },
                  },
                  h1: { color: theme('colors.gray.100') },
                  h2: { color: theme('colors.gray.100') },
                  h3: { color: theme('colors.gray.100') },
                  h4: { color: theme('colors.gray.100') },
                  code: { color: theme('colors.primary.300') },
                  strong: { color: theme('colors.gray.100') },
                  blockquote: { color: theme('colors.gray.400') },
                },
              },
            }),
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      
      /* Hide scrollbar for textarea but allow scrolling */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* TipTap Editor Styles */
      .ProseMirror {
        outline: none;
        min-height: 100%;
      }
      .ProseMirror p.is-editor-empty:first-child::before {
        color: #94a3b8;
        content: attr(data-placeholder);
        float: left;
        height: 0;
        pointer-events: none;
      }
    </style>
