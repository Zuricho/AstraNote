<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstraNote</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.css"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#172033",
              mist: "#f5f1e8",
              pine: "#365246",
              clay: "#b86a4a",
              paper: "#fffdf8",
              dusk: "#22314d",
            },
            boxShadow: {
              panel: "0 24px 80px rgba(23, 32, 51, 0.16)",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(184, 106, 74, 0.2), transparent 24rem),
          radial-gradient(circle at top right, rgba(54, 82, 70, 0.18), transparent 24rem),
          linear-gradient(180deg, #f7f2e9 0%, #f2eee6 100%);
      }

      .dark body {
        background:
          radial-gradient(circle at top left, rgba(184, 106, 74, 0.14), transparent 24rem),
          radial-gradient(circle at top right, rgba(103, 130, 118, 0.14), transparent 24rem),
          linear-gradient(180deg, #121927 0%, #0f1522 100%);
      }

      .ProseMirror {
        min-height: 100%;
        outline: none;
        white-space: pre-wrap;
      }

      .ProseMirror p.is-editor-empty:first-child::before {
        color: #94a3b8;
        content: attr(data-placeholder);
        float: left;
        height: 0;
        pointer-events: none;
      }

      .ProseMirror code {
        border-radius: 0.5rem;
        background: rgba(148, 163, 184, 0.18);
        padding: 0.12rem 0.38rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        color: #b45309;
      }

      .dark .ProseMirror code {
        background: rgba(51, 65, 85, 0.9);
        color: #fdba74;
      }

      .ProseMirror pre {
        overflow-x: auto;
        border-radius: 0.45rem;
        background: #0f172a;
        padding: 0.85rem 1rem;
        color: #e2e8f0;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      }

      .dark .ProseMirror pre {
        background: #020617;
      }

      .ProseMirror pre code {
        display: block;
        background: transparent;
        padding: 0;
        border-radius: 0;
        color: inherit;
        font-size: 0.95em;
        line-height: 1.75;
      }

      .tiptap-mathematics-render {
        cursor: pointer;
      }

      .tiptap-mathematics-render[data-type="inline-math"] {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        background: rgba(54, 82, 70, 0.1);
        padding: 0.15rem 0.55rem;
      }

      .dark .tiptap-mathematics-render[data-type="inline-math"] {
        background: rgba(54, 82, 70, 0.28);
      }

      .editor-scroll::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .editor-scroll::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.55);
        border-radius: 9999px;
      }

      .editor-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .ProseMirror h1,
      .ProseMirror h2,
      .ProseMirror h3 {
        line-height: 1.3;
      }

      .ProseMirror h1 {
        margin: 0.9rem 0 0.45rem;
        font-size: 1.45rem;
      }

      .ProseMirror h2 {
        margin: 0.8rem 0 0.4rem;
        font-size: 1.2rem;
      }

      .ProseMirror h3 {
        margin: 0.7rem 0 0.35rem;
        font-size: 1.05rem;
      }

      .ProseMirror p,
      .ProseMirror ul,
      .ProseMirror ol,
      .ProseMirror blockquote,
      .ProseMirror pre {
        margin: 0.45rem 0;
      }

      .ProseMirror li + li {
        margin-top: 0.18rem;
      }
    </style>
  </head>
  <body class="text-ink antialiased transition-colors duration-200 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
